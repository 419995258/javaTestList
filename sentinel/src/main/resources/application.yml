server:
  port: 8083

spring:
  application:
    name: cloud-sentinel-service
  cloud:
#    nacos:
#      discovery:
#        server-addr: localhost:8848 #Nacos服务注册中心地址
    sentinel:
      transport:
        dashboard: localhost:8080 #配置Sentinel dashboard地址
        port: 8719 #默认8719，如果被占用会从8719开始扫描+1直到找到未被占用的端口

# 图形化界面监控
management:
  endpoints:
    web:
      exposure:
        include: '*'

feign:
  sentinel:
    enabled: true # 激活Sentinel对Feign的支持
